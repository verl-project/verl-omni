name: type_coverage_check

on:
  pull_request:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/type-coverage-check.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  type_coverage_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install --no-deps "verl @ git+https://github.com/verl-project/verl.git@main"
          pip install -r requirements.txt
          pip install --no-deps -e .
      - name: Run type annotation coverage check
        run: python3 tests/special_sanity/type_coverage_check.py
      - name: Run docstring coverage check
        run: python3 tests/special_sanity/check_api_docs.py verl_omni
