name: type_coverage_check

on:
  pull_request:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/type-coverage-check.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  type_coverage_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install --no-deps "verl @ git+https://github.com/verl-project/verl.git@main"
          pip install -r requirements.txt
          pip install --no-deps -e .
      - name: Run type annotation coverage check
        run: python3 tests/special_sanity/type_coverage_check.py
      - name: Run docstring coverage check
        run: python3 tests/special_sanity/check_api_docs.py verl_omni
