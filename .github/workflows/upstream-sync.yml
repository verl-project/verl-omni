name: upstream-sync

on:
  schedule:
    - cron: '0 2 * * *'  # daily 2 AM UTC
  workflow_dispatch:      # manual trigger for testing / backfill

concurrency:
  group: upstream-sync
  cancel-in-progress: false  # never cancel a running sync mid-flight

permissions:
  contents: write       # create branches for auto-PRs (never pushes to main)
  pull-requests: write  # open PRs
  actions: write        # read/write SHA state variables

jobs:
  track1-signatures:
    name: "Track 1 — signature drift"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      # -----------------------------------------------------------------------
      # 1. Setup
      # -----------------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch full history so the bot can create branches cleanly
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install upstream dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install --no-deps "verl @ git+https://github.com/verl-project/verl.git@main"
          pip install "vllm-omni==0.18"
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install --no-deps -e .

      # -----------------------------------------------------------------------
      # 2. Check open PRs — skip if backlog is too large
      # -----------------------------------------------------------------------
      - name: Check open upstream-sync PR backlog
        id: backlog
        run: |
          OPEN=$(gh pr list \
            --label "upstream-sync" \
            --state open \
            --json number \
            --jq 'length')
          echo "open_count=$OPEN" >> "$GITHUB_OUTPUT"
          if [ "$OPEN" -ge 3 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::$OPEN upstream-sync PRs still open — skipping new PR creation"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on oldest open PR if backlog ≥ 3
        if: steps.backlog.outputs.skip == 'true'
        run: |
          OLDEST_PR=$(gh pr list \
            --label "upstream-sync" \
            --state open \
            --json number,createdAt \
            --jq 'sort_by(.createdAt) | .[0].number')
          if [ -n "$OLDEST_PR" ]; then
            gh pr comment "$OLDEST_PR" \
              --body "⚠️ **upstream-sync bot**: additional upstream changes were detected on $(date -u '+%Y-%m-%d') but skipped because ${{ steps.backlog.outputs.open_count }} upstream-sync PRs are already open. Please review and merge the open PRs to unblock future syncs."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 3. Detect signature drift
      # -----------------------------------------------------------------------
      - name: Detect signature drift
        if: steps.backlog.outputs.skip == 'false'
        id: detect
        run: |
          python scripts/upstream_sync/check_upstream_signatures.py
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo "::error::Upstream packages not resolvable — check pip install step"
            exit 1
          fi
          # EXIT 0 = no drift, EXIT 1 = drift found; both are workflow successes here
          exit 0

      # -----------------------------------------------------------------------
      # 4. Apply mechanical fixes
      # -----------------------------------------------------------------------
      - name: Apply mechanical fixes (tiers 1-4)
        if: steps.backlog.outputs.skip == 'false' && steps.detect.outputs.has_changes == 'true'
        id: fix
        run: python scripts/upstream_sync/apply_signature_fixes.py

      # -----------------------------------------------------------------------
      # 5. Run sanity checks on edited code
      # -----------------------------------------------------------------------
      - name: Sanity check edited code
        if: steps.fix.outputs.has_pr_content == 'true'
        id: sanity
        continue-on-error: true  # failure adds a label but doesn't block PR creation
        run: pytest -s -x tests/special_sanity

      # -----------------------------------------------------------------------
      # 6. Open auto-PR
      # -----------------------------------------------------------------------
      - name: Configure git identity
        if: steps.fix.outputs.has_pr_content == 'true'
        run: |
          git config user.name  "upstream-sync-bot"
          git config user.email "upstream-sync-bot@users.noreply.github.com"

      - name: Create branch and open PR
        if: steps.fix.outputs.has_pr_content == 'true'
        id: pr
        run: |
          BRANCH="bot/upstream-sync-track1-$(date -u +%Y%m%d)"

          # Bail out if branch already exists (idempotency — same day re-run)
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" 2>/dev/null; then
            echo "::notice::Branch $BRANCH already exists — skipping duplicate PR"
            exit 0
          fi

          git checkout -b "$BRANCH"

          # Stage only the files we own: the snapshot + any edits to verl_omni/
          git add .github/upstream_sync/api_signatures.json
          git add verl_omni/ || true  # may be empty if only tier-1 changes

          # Don't commit if nothing actually changed on disk
          if git diff --cached --quiet; then
            echo "::notice::No file changes to commit — snapshot was already current"
            exit 0
          fi

          git commit -m "chore(upstream-sync): Track 1 signature drift $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"

          LABELS="upstream-sync"
          if [ "${{ steps.fix.outputs.needs_human_review }}" = "true" ]; then
            LABELS="$LABELS,needs-human-review"
          fi
          if [ "${{ steps.sanity.outcome }}" = "failure" ]; then
            LABELS="$LABELS,sanity-failed"
          fi

          gh pr create \
            --title "[bot][upstream-sync] Track 1: signature drift $(date -u +%Y-%m-%d)" \
            --body-file pr_body_track1.md \
            --label "$LABELS" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 7. Record upstream SHA for Track 2 (used starting Week 3)
      #    Stores the verl HEAD SHA so the behavioral-drift job can do
      #    `git log <last_sha>..HEAD` without re-processing old commits.
      # -----------------------------------------------------------------------
      - name: Record upstream verl SHA
        if: always()  # update even if no drift was found, so we advance the pointer
        run: |
          # Get the SHA of the verl package we just installed
          VERL_SHA=$(python3 - <<'EOF'
          import importlib.util, subprocess, pathlib
          spec = importlib.util.find_spec("verl")
          if spec:
              pkg_dir = pathlib.Path(spec.origin).parent
              result = subprocess.run(
                  ["git", "rev-parse", "HEAD"],
                  cwd=pkg_dir, capture_output=True, text=True
              )
              print(result.stdout.strip())
          EOF
          )
          if [ -z "$VERL_SHA" ]; then
            echo "::warning::Could not determine verl HEAD SHA — SHA variable not updated"
            exit 0
          fi
          echo "verl SHA: $VERL_SHA"

          # Upsert the repository variable (create if missing, patch if exists)
          gh api "repos/${{ github.repository }}/actions/variables/UPSTREAM_VERL_SHA" \
            --method PATCH \
            -f value="$VERL_SHA" 2>/dev/null || \
          gh api "repos/${{ github.repository }}/actions/variables" \
            --method POST \
            -f name="UPSTREAM_VERL_SHA" \
            -f value="$VERL_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 8. Clean up temp files so they don't pollute the workspace
      # -----------------------------------------------------------------------
      - name: Clean up temp files
        if: always()
        run: |
          rm -f signature_changes.json remaining_complex.json pr_body_track1.md \
                .github/upstream_sync/api_signatures_fresh.json
